services:
  api:
    image: igrejav2-api
    container_name: igrejav2-api
    build:
      context: .
      dockerfile: IgrejaV2.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=igrejav2;Username=postgres;Password=postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: igrejav2-postgres
    restart: "no"
    environment:
      POSTGRES_DB: igrejav2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d igrejav2"]
      interval: 5s
      timeout: 5s
      retries: 5
    # volumes:                                      # persistência — desabilitada por enquanto
    #   - postgres_data:/var/lib/postgresql/data

# volumes:                                          # descomentar junto com o volume acima
#   postgres_data:
